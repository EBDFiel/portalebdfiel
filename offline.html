<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - EBD Fiel</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef6ff 100%);
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    .offline-box {
      max-width: 400px;
      padding: 32px;
      background: #ffffff;
      border-radius: 28px;
      border: 1px solid #e2e8f0; box-shadow: 0 16px 40px rgba(15,23,42,0.08);
    }
    h1 { color: #1e3a8a; margin-bottom: 16px; }
    p { color: #64748b; margin-bottom: 24px; }
    button {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border: none;
      padding: 12px 24px;
      border-radius: 999px;
      font-weight: bold;
      cursor: pointer;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="offline-box">
    <h1>🔌 Sem conexão</h1>
    <p>Você está offline. Conecte-se à internet para acessar as lições atualizadas.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
